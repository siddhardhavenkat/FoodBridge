{% extends 'base.html' %}{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo-wrap">
      <img src="{{ url_for('static', filename='images/logo-icon.png') }}" class="auth-logo-img" alt="FoodBridge">
    </div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Login to FoodBridge</p>
    <form method="post" action="{{ url_for('auth.login') }}" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input name="email" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input name="password" id="loginPassword" type="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="pw-eye" onclick="togglePw('loginPassword',this)">👁</button>
        </div>
      </div>
      <div class="forgot-link-row">
        <a href="{{ url_for('auth.forgot_password') }}" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn-auth">Login →</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.register') }}">Register free</a></p>
  </div>
</div>
<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}
</script>
{% endblock %}
