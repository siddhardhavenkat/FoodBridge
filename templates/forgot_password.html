{% extends 'base.html' %}{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo-wrap">
      <img src="{{ url_for('static', filename='images/logo-icon.png') }}" class="auth-logo-img" alt="FoodBridge">
    </div>
    <h2 class="auth-title">Reset Password</h2>
    <p class="auth-sub">Enter your registered email — we'll send a reset link</p>
    <form method="post" action="{{ url_for('auth.forgot_password') }}" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <input name="email" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn-auth">📧 Send Reset Link</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('auth.login') }}">← Back to Login</a></p>
  </div>
</div>
{% endblock %}
