{% extends 'base.html' %}{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo-wrap">
      <img src="{{ url_for('static', filename='images/logo-icon.png') }}" class="auth-logo-img" alt="FoodBridge">
    </div>
    <h2 class="auth-title">New Password</h2>
    <p class="auth-sub">Enter your new password below</p>
    <form method="post" action="{{ url_for('auth.reset_password', token=token) }}" class="auth-form">
      <div class="form-group">
        <label>New Password</label>
        <div class="pw-wrap">
          <input name="password" id="newpw" type="password" placeholder="Min 6 characters" required>
          <button type="button" class="pw-eye" onclick="togglePw('newpw',this)">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <div class="pw-wrap">
          <input name="confirm_password" id="confirmpw" type="password" placeholder="Repeat password" required>
          <button type="button" class="pw-eye" onclick="togglePw('confirmpw',this)">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-auth">🔐 Reset Password</button>
    </form>
  </div>
</div>
<script>
function togglePw(id,btn){const inp=document.getElementById(id);if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}else{inp.type='password';btn.textContent='👁';}}
</script>
{% endblock %}
